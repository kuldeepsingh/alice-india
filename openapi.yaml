openapi: 3.0.0
info:
  title: Alice India Trading Platform API
  description: Professional multi-user trading platform for Indian markets
  version: 1.0.0
  contact:
    name: Kuldeep Singh
    email: kuldeep@arrcus.com

servers:
  - url: http://localhost:3000/api/v1
    description: Development Server
  - url: https://api.alice-india.com/api/v1
    description: Production Server

paths:
  /auth/register:
    post:
      summary: Register new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        '201':
          description: User created successfully
        '400':
          description: Invalid input
        '409':
          description: Email already exists

  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Invalid refresh token

  /accounts:
    get:
      summary: Get all user accounts
      tags:
        - Accounts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of accounts
    post:
      summary: Create new trading account
      tags:
        - Accounts
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brokerType:
                  type: string
                  enum: [zerodha, upstox, shoonya]
                accountLabel:
                  type: string
      responses:
        '201':
          description: Account created

  /orders:
    get:
      summary: Get all user orders
      tags:
        - Orders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of orders
    post:
      summary: Create new order
      tags:
        - Orders
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  type: string
                symbol:
                  type: string
                side:
                  type: string
                  enum: [BUY, SELL]
                quantity:
                  type: number
                price:
                  type: number
      responses:
        '201':
          description: Order created

  /market/quote/{symbol}:
    get:
      summary: Get market quote for symbol
      tags:
        - Market Data
      parameters:
        - in: path
          name: symbol
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Market quote

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Authentication
    description: User authentication endpoints
  - name: Accounts
    description: Trading account management
  - name: Orders
    description: Order management
  - name: Market Data
    description: Real-time market data
